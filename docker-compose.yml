services:
  app:
    build: .
    ports:
      - "8080:8080/udp"       # Right Camera Streaming Port
      - "8081:8081/udp"       # Left Camera Streaming Port
      - "12345:12345/udp"     # Broadcast
      - "8765:8765"           # Video Websocket Port
      - "8766:8766"           # Command Websocket Port
    restart: unless-stopped
