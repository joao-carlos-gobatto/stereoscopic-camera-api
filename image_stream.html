<!DOCTYPE html>
<html>
<head>
    <title>Visão Estéreo</title>
</head>
<body>
    <h1>Stream Estéreo via Websocket</h1>
    <img id="stream" style="width: 1280px; height: 480px;" alt="Stream">
    <p>Pressione 's' para salvar imagens no servidor</p>
    <p>Pressione 'r' para resetar pastas de calibração no servidor</p>
    <script>
        const ws = new WebSocket('ws://localhost:8765');  // Substitua por IP/porta do servidor
        ws.binaryType = 'blob';
        ws.onopen = function() {
            console.log('Conectado ao websocket');
        };
        ws.onmessage = function(event) {
            if (event.data instanceof Blob) {  // Imagens são binárias (JPG)
                const img = document.getElementById('stream');
                const url = URL.createObjectURL(event.data);
                img.src = url;
                // Libera URL anterior para evitar memory leak
                setTimeout(() => URL.revokeObjectURL(url), 100);
            } else {
                console.log('Mensagem de texto recebida:', event.data);  // Se precisar de respostas do server
            }
        };
        ws.onclose = function() {
            console.log('Desconectado');
        };
        // Example: send different actions
        document.addEventListener('keydown', function(event) {
            if (event.key === 's') {
                ws.send(JSON.stringify({ action: 'save' }));
            } else if (event.key === 'r') {
                ws.send(JSON.stringify({ action: 'reset' }));
            } else if (event.key === 'q') {  // example future action
                ws.send(JSON.stringify({ action: 'shutdown' }));
            }
        });

    // Or add real buttons:
    // <button onclick="ws.send(JSON.stringify({action:'save'}))">Save Image Pair</button>
    </script>
</body>
</html>
